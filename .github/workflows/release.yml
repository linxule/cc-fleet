name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: goreleaser
    # OIDC trusted publishing (no stored token). Gated until cc-fleet's first
    # publish is done manually and a trusted publisher is configured on npmjs.
    if: vars.NPM_TRUSTED_PUBLISHING == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1 (newer than the bundled npm).
      - run: npm install -g npm@latest
      # Sync package.json to the tag (strip the leading v), then publish. The
      # binary the package downloads at install time was released by the
      # goreleaser job above (needs: goreleaser).
      - run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - run: npm publish --access public
