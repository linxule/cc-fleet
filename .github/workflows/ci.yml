name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        if: runner.os == 'Linux'
        with:
          node-version: "20"
      - name: test (npm postinstall verify)
        if: runner.os == 'Linux'
        run: node --test npm/install.test.js
      - name: gofmt
        if: runner.os != 'Windows'
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
      - name: codex-plugin drift check
        if: runner.os != 'Windows'
        run: make codex-plugin-drift-check
      - name: test (all)
        if: runner.os != 'Windows'
        run: go test -race ./...
      # Windows supports every lane except the tmux teammate lane (spawn / tmux /
      # teardown / panevis install `#!/bin/sh` fakes and stay unix-only, so NOT
      # `./...`). Test the full windows-clean package set: the real LockFileEx
      # seams (config, secrets), subagent, the daemon-liveness + workflow lanes,
      # and the supporting leaves. -race needs the runner's bundled gcc (present
      # on the image).
      - name: test (windows lanes)
        if: runner.os == 'Windows'
        run: >
          go test -race
          ./internal/config/... ./internal/secrets/... ./internal/subagent/...
          ./internal/codexproxy/... ./internal/workflow/... ./internal/run/...
          ./internal/version/... ./internal/models/... ./internal/neterr/...
          ./internal/ids/... ./internal/redact/... ./internal/childenv/...
          ./internal/fileutil/... ./internal/permmode/... ./internal/providerclass/...
          ./internal/diag/... ./internal/sessiontitle/... ./internal/teamhist/...
          ./internal/pinned/... ./internal/onboarding/... ./internal/userops/...
          ./internal/procintrospect/... ./internal/ccver/... ./internal/profile/...
          ./internal/doctor/... ./internal/tui/... ./internal/leadsession/...
          ./internal/homedir/...
      - name: build (make)
        if: runner.os != 'Windows'
        run: make build
      - name: build (go)
        if: runner.os == 'Windows'
        run: go build ./...
      # Cheap cross-compile wall — catches windows build breaks without a runner.
      - name: windows cross-compile gate
        if: runner.os == 'Linux'
        run: |
          GOOS=windows GOARCH=amd64 go build ./...
          GOOS=windows GOARCH=amd64 go vet ./...
